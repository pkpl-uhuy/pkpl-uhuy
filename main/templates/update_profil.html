{% extends 'base.html' %}
{% block title %}Edit Profil - {{ biodata.nama }}{% endblock %}

{% block content %}
<div class="container" style="padding: 60px 0;">
    <div style="background: #ffffff; padding: 40px; border-radius: 24px; max-width: 600px; margin: 0 auto; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 60px; height: 60px; background: #fef2f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: #990b29; font-size: 1.5rem;">
                <i class="fa-solid fa-user-pen"></i>
            </div>
            <h2 style="color: #1e293b; margin-bottom: 8px; font-weight: 800;">Edit Biodata</h2>
            <p style="color: #64748b; font-size: 0.95rem; margin: 0;">Perbarui informasi untuk profil <strong>{{ biodata.nama }}</strong>.</p>
        </div>

        <!-- Form Edit Profil -->
        <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            
            <div>
                <label style="display: block; font-size: 0.85rem; color: #64748b; font-weight: 600; margin-bottom: 6px;">Nama Lengkap:</label>
                <input type="text" name="nama" value="{{ biodata.nama }}" required
                       style="width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; font-family: var(--font-main); outline: none; transition: 0.2s;" 
                       onfocus="this.style.borderColor='#990b29'" onblur="this.style.borderColor='#e2e8f0'">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 0.85rem; color: #64748b; font-weight: 600; margin-bottom: 6px;">NPM:</label>
                    <input type="text" name="npm" value="{{ biodata.npm }}" required
                           style="width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; font-family: 'Space Mono', monospace; outline: none;"
                           onfocus="this.style.borderColor='#990b29'" onblur="this.style.borderColor='#e2e8f0'">
                </div>

                <div>
                    <label style="display: block; font-size: 0.85rem; color: #64748b; font-weight: 600; margin-bottom: 6px;">Peran / Role:</label>
                    <input type="text" name="peran" value="{{ biodata.peran }}" required 
                           style="width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; font-family: var(--font-main); outline: none;"
                           onfocus="this.style.borderColor='#990b29'" onblur="this.style.borderColor='#e2e8f0'">
                </div>
            </div>

            <div>
                <label style="display: block; font-size: 0.85rem; color: #64748b; font-weight: 600; margin-bottom: 6px;">Deskripsi Profil:</label>
                <textarea name="deskripsi" required
                          style="width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; height: 110px; resize: vertical; font-family: var(--font-main); outline: none;"
                          onfocus="this.style.borderColor='#990b29'" onblur="this.style.borderColor='#e2e8f0'">{{ biodata.deskripsi }}</textarea>
            </div>

            <!-- Input URL Foto Profil -->
            <div style="padding: 20px; border: 2px dashed #cbd5e1; border-radius: 12px; background: #f8fafc; text-align: center;">
                <label style="display: block; font-size: 0.85rem; color: #64748b; font-weight: 600; margin-bottom: 10px;">URL Foto Profil:</label>
                <input type="url" name="foto" value="{{ biodata.foto }}" 
                       placeholder="Masukkan URL gambar profil"
                       style="width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; color: #1e293b; outline: none;">
            </div>

            <div style="display: flex; gap: 15px; margin-top: 10px;">
                <a href="{% url 'landing_page' %}" style="flex: 1; text-align: center; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; color: #475569; text-decoration: none; font-weight: 600; transition: 0.2s;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">Batal</a>
                <button type="submit" style="flex: 2; padding: 14px; border-radius: 12px; border: none; background: #990b29; color: #ffffff; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem;" onmouseover="this.style.background='#7a0921'" onmouseout="this.style.background='#990b29'">
                    Simpan Perubahan
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
